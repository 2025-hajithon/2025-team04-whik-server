name: Build and Deploy

on:
  push:
    branches:
      - dev

permissions:
  id-token: write
  pull-requests: write

env:
  IMAGE_NAME: whik-server

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment: develop
    strategy:
      matrix:
        java-version: [17]
        distribution: ["temurin"]
    steps:
      # м≤інБђмХДмЫГ
      - name: Checkout
        uses: actions/checkout@v4

      # JDK 17 л≤Дм†ДмЬЉл°Ь мДЄнМЕ
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java-version }}
          distribution: ${{ matrix.distribution }}

      # Gradlew мЛ§нЦЙ нЧИмЪ©
      - name: Run chmod to make gradlew executable
        run: chmod +x ./gradlew

      # Gradle лєМлУЬ
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/develop' }} # feature лЄМлЮЬмєШлКФ мЇРмЛЬл•Љ мЭљкЄ∞ м†ДмЪ©мЬЉл°Ь мД§м†Х
          cache-encryption-key: ${{ secrets.GRADLE_CACHE_ENCRYPTION_KEY }}
          add-job-summary-as-pr-comment: always
          build-scan-publish: true
          build-scan-terms-of-use-url: "https://gradle.com/help/legal-terms-of-use"
          build-scan-terms-of-use-agree: "yes"

      - name: Build with Gradle
        id: gradle
        run: ./gradlew build --configuration-cache

      # Dockerhub л°ЬкЈЄмЭЄ
      - name: Login to Dockerhub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Docker л©ФнГАлН∞мЭінД∞ мґФмґЬ
      - name: Extract Docker metadata
        id: metadata
        uses: docker/metadata-action@v5.5.0
        env:
          DOCKERHUB_IMAGE_FULL_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}
        with:
          images: ${{ env.DOCKERHUB_IMAGE_FULL_NAME }}
          tags: |
            type=sha,prefix=

      # мЭілѓЄмІА лєМлУЬ л∞П DockerhubмЧР нСЄмЛЬ
      - name: Docker Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.metadata.outputs.tags }}

      # docker-compose.ymlмЭД EC2мЧР л≥µмВђ
      - name: Copy docker-compose file to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          source: "docker-compose.yml"
          target: "/home/ubuntu"
          overwrite: true

      # EC2л°Ь л∞∞нПђ
      - name: Deploy to EC2 Server
        uses: appleboy/ssh-action@master
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          IMAGE_FULL_URL: ${{ steps.metadata.outputs.tags }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          envs: IMAGE_FULL_URL # docker-compose.yml мЧРмДЬ мВђмЪ©нХ† нЩШк≤љ л≥АмИШ
          script: |
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
            docker pull ${{ env.IMAGE_FULL_URL }}
            docker compose up -d
            docker image prune -a -f
